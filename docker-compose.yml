version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: eventhat_postgres
    environment:
      POSTGRES_USER: eventhat
      POSTGRES_PASSWORD: eventhat_dev
      POSTGRES_DB: eventhat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventhat"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eventhat_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
